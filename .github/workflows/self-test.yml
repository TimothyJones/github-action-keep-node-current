name: Self Test
# Manually runs this action against its own repository to exercise the real
# GitHub Actions runtime (token, permissions, PR creation). Defaults to dry-run.
on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Compute changes without committing or opening a PR"
        type: boolean
        default: true

permissions:
  id-token: write # federate this job's identity with Octo STS — no stored secrets

jobs:
  self-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Exchange this workflow's OIDC identity for a short-lived token, per the
      # trust policy in .github/chainguard/keep-node-current.sts.yaml.
      - uses: octo-sts/action@main
        id: octo-sts
        with:
          scope: TimothyJones/github-action-keep-node-current
          identity: keep-node-current
      - name: Run node-version-sync on this repo
        id: sync
        uses: ./
        with:
          token: ${{ steps.octo-sts.outputs.token }}
          dry-run: ${{ inputs.dry-run }}
          branch: test/node-version-sync
      - name: Summary
        run: |
          {
            echo "### node-version-sync result"
            echo "- changed: ${{ steps.sync.outputs.changed }}"
            echo "- added: ${{ steps.sync.outputs.added }}"
            echo "- removed: ${{ steps.sync.outputs.removed }}"
            echo "- PR: ${{ steps.sync.outputs.pr-url }}"
          } >> "$GITHUB_STEP_SUMMARY"
