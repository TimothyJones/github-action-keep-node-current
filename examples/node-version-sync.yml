# Copy this into a consuming repository at .github/workflows/node-version-sync.yml
name: Node Version Sync
on:
  schedule:
    - cron: "0 6 * * 1" # every Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: your-org/node-version-sync@v1
        with:
          # A classic PAT with repo + workflow scopes (or a GitHub App token with
          # contents/pull-requests/workflows write). The default GITHUB_TOKEN cannot
          # push changes to files under .github/workflows/.
          token: ${{ secrets.SYNC_PAT }}
